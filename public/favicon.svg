<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="padGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5dade2" />
      <stop offset="100%" stop-color="#2874a6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Controller Base -->
  <path d="M 34 32
           C 10 32, 6 56, 14 82
           C 18 94, 34 96, 42 84
           C 48 76, 56 72, 64 72
           C 72 72, 80 76, 86 84
           C 94 96, 110 94, 114 82
           C 122 56, 118 32, 94 32
           C 70 32, 58 32, 34 32
           Z"
        fill="url(#padGrad)"
        stroke="#ffffff"
        stroke-width="5"
        stroke-linejoin="round"
        filter="url(#shadow)" />

  <!-- D-Pad (Left) -->
  <path d="M 30 50 v -8 h 8 v 8 h 8 v 8 h -8 v 8 h -8 v -8 h -8 v -8 h 8 z" fill="#ffffff" />

  <!-- Action Buttons (Right) -->
  <circle cx="94" cy="42" r="6" fill="#ffd700" /> <!-- Top -->
  <circle cx="106" cy="54" r="6" fill="#ff5722" /> <!-- Right -->
  <circle cx="94" cy="66" r="6" fill="#4caf50" /> <!-- Bottom -->
  <circle cx="82" cy="54" r="6" fill="#ffffff" /> <!-- Left -->

  <!-- Center Menu Buttons -->
  <rect x="52" y="50" width="8" height="4" rx="2" fill="#ffffff" opacity="0.9" transform="rotate(25 56 52)" />
  <rect x="68" y="50" width="8" height="4" rx="2" fill="#ffffff" opacity="0.9" transform="rotate(-25 72 52)" />
</svg>