<div class="z-filters-panel">
  <div class="z-filters-panel__header">
    <button
      type="button"
      class="z-filters-panel__toggle"
      (click)="toggleOpen()"
      [attr.aria-expanded]="isOpen()"
      aria-controls="z-filters-groups">
      <span class="material-icons" aria-hidden="true">tune</span>
      <span class="z-filters-panel__toggle-label">Filtros</span>
      @if (activeCount() > 0) {
      <span class="z-filters-panel__badge">{{ activeCount() }}</span>
      }
      <span
        class="material-icons z-filters-panel__chevron"
        [class.z-filters-panel__chevron--open]="isOpen()"
        aria-hidden="true"
        >expand_more</span
      >
    </button>

    @if (activeCount() > 0) {
    <button
      type="button"
      class="z-filters-panel__clear"
      (click)="clearAll()">
      <span class="material-icons" aria-hidden="true">close</span>
      <span>Limpiar</span>
    </button>
    }
  </div>

  <div
    class="z-filters-collapse"
    [class.z-filters-collapse--open]="isOpen()">
    <div class="z-filters-collapse__inner">
      <div
        class="z-filters"
        id="z-filters-groups"
        role="group"
        aria-label="Filtros de mapas">
        <div class="z-filters__group">
          <span class="z-filters__label" id="z-filter-saga">
            <span class="material-icons" aria-hidden="true">layers</span>
            Saga
          </span>
          <div
            class="z-filters__chips"
            role="group"
            aria-labelledby="z-filter-saga">
            <button
              type="button"
              class="z-chip"
              [class.z-chip--active]="criteria().saga === 'aether'"
              [attr.aria-pressed]="criteria().saga === 'aether'"
              (click)="toggleSaga('aether')">
              Aether
            </button>
            <button
              type="button"
              class="z-chip"
              [class.z-chip--active]="criteria().saga === 'chaos'"
              [attr.aria-pressed]="criteria().saga === 'chaos'"
              (click)="toggleSaga('chaos')">
              Chaos
            </button>
          </div>
        </div>

        <div class="z-filters__group">
          <span class="z-filters__label" id="z-filter-flags">
            <span class="material-icons" aria-hidden="true"
              >event_available</span
            >
            Disponibilidad
          </span>
          <div
            class="z-filters__chips"
            role="group"
            aria-labelledby="z-filter-flags">
            <button
              type="button"
              class="z-chip"
              [class.z-chip--active]="criteria().hasMainQuest === true"
              [attr.aria-pressed]="criteria().hasMainQuest === true"
              (click)="toggleMainQuest()">
              Con misión principal
            </button>
            <button
              type="button"
              class="z-chip"
              [class.z-chip--active]="criteria().soloOnly"
              [attr.aria-pressed]="criteria().soloOnly"
              (click)="toggleSolo()">
              Disponible en solitario
            </button>
          </div>
        </div>

        <div class="z-filters__group">
          <span class="z-filters__label" id="z-filter-players">
            <span class="material-icons" aria-hidden="true">groups</span>
            Puedo reunir a
          </span>
          <div
            class="z-segmented"
            role="group"
            aria-labelledby="z-filter-players">
            @for (n of playerOptions; track n) {
            <button
              type="button"
              class="z-segmented__btn"
              [class.z-segmented__btn--active]="
                criteria().minimumPlayers === n
              "
              [attr.aria-pressed]="criteria().minimumPlayers === n"
              [attr.aria-label]="n + (n === 1 ? ' jugador' : ' jugadores')"
              (click)="setPlayers(n)">
              {{ n }}
            </button>
            }
          </div>
        </div>

        <div class="z-filters__group">
          <span class="z-filters__label" id="z-filter-status">
            <span class="material-icons" aria-hidden="true">flag</span>
            Estado
          </span>
          <div
            class="z-filters__chips"
            role="group"
            aria-labelledby="z-filter-status">
            @for (option of statusOptions; track option.value) {
            <button
              type="button"
              class="z-chip"
              [class.z-chip--active]="criteria().status === option.value"
              [attr.aria-pressed]="criteria().status === option.value"
              (click)="toggleStatus(option.value)">
              {{ option.label }}
            </button>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
